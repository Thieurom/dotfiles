# vim:fileencoding=utf-8:ft=conf

font_family Fira Code
bold_font auto
italic_font auto
bold_italic_font auto
font_size 19.0
adjust_line_height 125%

shell_integration no-cursor
cursor_shape block

enabled_layouts *
window_border_width 1.0
window_padding_width 24 4 4 4
inactive_text_alpha 0.4
tab_bar_min_tabs 1
tab_bar_style fade
tab_title_template "{'[' if layout_name == 'stack' else ''}{tab.active_wd.rsplit('/', 1)[-1] or '/'}{']' if layout_name == 'stack' else ''}"

macos_option_as_alt yes

map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

map cmd+shift+m detach_window ask
map ctrl+shift+enter launch --cwd=current
map kitty_mod+x toggle_layout stack
map ctrl+shift+o toggle_layout stack
map ctrl+shift+w resize_window wider
map ctrl+shift+t resize_window taller
map ctrl+shift+s resize_window shorter 3

include current-theme.conf

# Override theme: match titlebar to terminal background
macos_titlebar_color background
